# ===========================================
# Lefthook — Git Hooks Configuration
# ===========================================
# Install: lefthook install
# Run manually: lefthook run pre-commit

pre-commit:
  parallel: false
  commands:
    phpcbf-format:
      glob: "*.php"
      run: vendor/bin/phpcbf --standard=phpcs.xml.dist {staged_files}
      exclude: "^(vendor|node_modules)/"
      stage_fixed: true

    phpcs-lint:
      glob: "*.php"
      run: vendor/bin/phpcs --standard=phpcs.xml.dist {staged_files}
      exclude: "^(vendor|node_modules)/"

    phpstan-check:
      glob: "*.php"
      run: vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --no-progress {staged_files}
      exclude: "^(vendor|node_modules)/"

    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css,scss}"
      exclude:
        - .zed/settings.json
      run: pnpx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css,scss}"
      exclude:
        - .zed/settings.json
      run: pnpx @biomejs/biome check --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {push_files}
