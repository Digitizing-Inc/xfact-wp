; ===========================================
; Custom PHP Configuration for WordPress
; ===========================================

; --- Upload Limits ---
upload_max_filesize = 64M
post_max_size = 64M

; --- Memory ---
memory_limit = 256M

; --- Execution ---
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; --- Error Handling ---
; In production, disable display_errors. The Docker override enables WP_DEBUG.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- Session ---
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1

; --- Miscellaneous ---
expose_php = Off
date.timezone = UTC
